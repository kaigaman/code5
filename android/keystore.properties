# This file references keystore for signing release builds.
# Generate an upload keystore in Android Studio:
#   Build -> Generate Signed Bundle/APK -> Create New Keystore
#
# Then fill in the values below.
#
# storeFile: path to the .jks keystore file (relative to project root or absolute)
# storePassword: keystore password
# keyAlias: alias name for the key
# keyPassword: key password

storeFile=code5-upload-key.jks
storePassword=your_keystore_password
keyAlias=code5
keyPassword=your_key_password
